site_name: aiomost-tools
site_description: Асинхронный инструментарий для Mattermost-ботов
site_url: https://iliapr.github.io/aiomost/
repo_url: https://github.com/IliaPr/aiomost
repo_name: IliaPr/aiomost

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Включить тёмную тему
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Включить светлую тему

nav:
  - Главная: index.md
  - Начало работы:
      - Установка: getting-started/installation.md
      - Конфигурация: getting-started/configuration.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang:
        - ru
        - en
