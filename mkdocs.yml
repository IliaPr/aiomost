site_name: aiomost-tools
site_description: Асинхронный инструментарий для Mattermost-ботов
site_url: https://iliapr.github.io/aiomost/
repo_url: https://github.com/IliaPr/aiomost
repo_name: IliaPr/aiomost

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Включить тёмную тему
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Включить светлую тему

nav:
  - Главная: index.md
  - Начало работы:
      - Установка: getting-started/installation.md
      - Конфигурация: getting-started/configuration.md
  - Руководства:
      - Отправка сообщений: guides/sending-messages.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - i18n:
      docs_structure: suffix
      languages:
        - locale: ru
          default: true
          name: Русский
          build: true
        - locale: en
          name: English
          build: true
          site_description: Async tools for building Mattermost bots
          nav_translations:
            Главная: Home
            Начало работы: Getting started
            Установка: Installation
            Конфигурация: Configuration
            Руководства: Guides
            Отправка сообщений: Sending messages
  - search:
      lang:
        - ru
        - en
